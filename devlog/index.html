<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Logs | FlorioLabs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: #0d0d0d;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            position: relative;
            padding: 2rem 0;
        }

        /* 3D Moving Grid Container */
        .grid-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            perspective: 600px;
            z-index: -1;
            overflow: hidden;
        }

        .background-grid {
            position: absolute;
            width: 200%; height: 200%;
            left: -50%; top: -10%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 2px, transparent 2px);
            background-size: 40px 40px;
            transform: rotateX(60deg) translateY(0);
            animation: grid-move 2s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(40px); }
        }

        .grid-fade {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #0d0d0d 20%, transparent 100%);
            z-index: 0;
        }

        .container { max-width: 800px; padding: 2rem; z-index: 1; width: 100%; }
        
        /* Navigation */
        nav { margin-bottom: 3rem; font-family: monospace; font-size: 0.9rem; }
        nav a { color: #00ffcc; text-decoration: none; transition: all 0.3s ease; }
        nav a:hover { color: #fff; text-shadow: 0 0 10px rgba(0, 255, 204, 0.4); }
        
        h1 { font-size: 3rem; letter-spacing: 4px; margin-bottom: 1rem; font-weight: 300; text-transform: uppercase; }
        h1 span { color: #00ffcc; font-weight: 600; }
        
        /* Log Entries */
        .log-entry {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: left;
            transition: all 0.3s ease;
        }
        
        .log-entry:hover {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }
        
        .log-date {
            color: #00ffcc;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 0.5rem;
        }
        
        .log-title {
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 1rem;
            color: #f0f0f0;
        }
        
        .log-excerpt {
            color: #888;
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        
        .read-more {
            color: #00ffcc;
            text-decoration: none;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .read-more:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="background-grid"></div>
        <div class="grid-fade"></div>
    </div>
    
    <div class="container">
        <nav><a href="../index.html">&lt; BACK TO HOME</a></nav>
        <h1>Engineering <span>Logs</span></h1>

        <div class="log-entry">
            <span class="log-date">MAR 04, 2026</span>
            <h2 class="log-title">Consolidating Stacked Boards into a Custom PCB</h2>
            <p class="log-excerpt"></p>
            <a href="#" class="read-more">READ ENTRY &gt;</a>
        </div>

        <div class="log-entry">
            <span class="log-date">FEB 20, 2026</span>
            <h2 class="log-title">Fixing Keypad Freezes: Tuning Audio Delays on Active Timers</h2>
            <p class="log-excerpt"></p>
            <a href="#" class="read-more">READ ENTRY &gt;</a>
        </div>

        <div class="log-entry">
            <span class="log-date">FEB 13, 2026</span>
            <h2 class="log-title">Migrating the Scoreboard from Wi-Fi to an ESP-NOW Mesh</h2>
            <p class="log-excerpt"></p>
            <a href="#" class="read-more">READ ENTRY &gt;</a>
        </div>
    </div>
</body>
</html>
