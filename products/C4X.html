<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C4-X Tactical Device | FlorioLabs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: #0d0d0d;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            position: relative;
            padding: 2rem 0;
        }

        /* 3D Moving Grid Container */
        .grid-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            perspective: 600px;
            z-index: -1;
            overflow: hidden;
        }

        .background-grid {
            position: absolute;
            width: 200%; height: 200%;
            left: -50%; top: -10%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 2px, transparent 2px);
            background-size: 40px 40px;
            transform: rotateX(60deg) translateY(0);
            animation: grid-move 2s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(40px); }
        }

        .grid-fade {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #0d0d0d 20%, transparent 100%);
            z-index: 0;
        }

        .container { max-width: 800px; padding: 2rem; z-index: 1; width: 100%; }
        
        /* Navigation */
        nav { margin-bottom: 3rem; font-family: monospace; font-size: 0.9rem; }
        nav a { color: #00ffcc; text-decoration: none; transition: all 0.3s ease; }
        nav a:hover { color: #fff; text-shadow: 0 0 10px rgba(0, 255, 204, 0.4); }
        
        h1 { font-size: 3rem; letter-spacing: 4px; margin-bottom: 1rem; font-weight: 300; text-transform: uppercase; }
        h1 span { color: #00ffcc; font-weight: 600; }
        
        .subtitle {
            color: #888;
            margin-bottom: 3rem;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        
        /* Details Sections */
        details {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 4px;
            margin-bottom: 2rem;
            text-align: left;
            transition: all 0.3s ease;
        }
        
        details:hover {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }
        
        summary {
            padding: 1.5rem;
            cursor: pointer;
            font-family: monospace;
            font-size: 1rem;
            color: #00ffcc;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            outline: none;
        }
        
        summary:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }
        
        .content {
            padding: 0 1.5rem 1.5rem;
            color: #f0f0f0;
            line-height: 1.5;
        }
        
        .btn-download {
            display: inline-block;
            color: #00ffcc;
            text-decoration: none;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            padding: 0.5rem 1rem;
            border: 1px solid #00ffcc;
            border-radius: 4px;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        
        .btn-download:hover {
            color: #fff;
            background: rgba(0, 255, 204, 0.1);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="background-grid"></div>
        <div class="grid-fade"></div>
    </div>
    
    <div class="container">
        <nav><a href="../index.html">&lt; BACK TO HOME</a></nav>

        <h1>C4-X <span>Tactical Device</span></h1>
        <p class="subtitle">Advanced logic board for scenario-based gameplay. ESP32 powered.</p>

        <details>
            <summary>Operator Manual</summary>
            <div class="content">
                </div>
        </details>

        <details>
            <summary>Hardware Pinout Documentation</summary>
            <div class="content">
                </div>
        </details>

        <details>
            <summary>Firmware Updates</summary>
            <div class="content">
                <p>Current Stable Release: <strong>v1.0.0</strong></p>
                <a href="../firmware/update.bin" class="btn-download" download>DOWNLOAD UPDATE.BIN</a>
            </div>
        </details>
    </div>
</body>
</html>
