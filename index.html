<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlorioLabs | Coming Soon</title>
    <style>
        /* CSS resets and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0d0d; /* Deep tech black */
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* Subtle grid background for that engineering feel */
        .background-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* Main content container */
        .container {
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* The 'Labs' accent color */
        h1 span {
            color: #00ffcc; /* A sharp, electric cyan */
            font-weight: 600;
        }

        p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .status-box {
            display: inline-block;
            border: 1px solid #333;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            font-family: monospace;
            font-size: 0.9rem;
            color: #00ffcc;
            letter-spacing: 1px;
        }

        /* A subtle pulse animation for the status dot */
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00ffcc;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    
    <div class="container">
        <h1>Florio<span>Labs</span></h1>
        <p>Hardware Engineering & Software Development. <br>Custom electronics, firmware, and cinematic control systems.</p>
        
        <div class="status-box">
            <span class="pulse"></span> SYSTEM INITIALIZING...
        </div>
    </div>
</body>
</html>
