<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlorioLabs | Engineering & Hardware</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: #0d0d0d;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* 3D Moving Grid Container */
        .grid-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            perspective: 600px;
            z-index: -1;
            overflow: hidden;
        }

        .background-grid {
            position: absolute;
            width: 200%; height: 200%;
            left: -50%; top: -10%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 2px, transparent 2px);
            background-size: 40px 40px;
            transform: rotateX(60deg) translateY(0);
            animation: grid-move 2s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(40px); }
        }

        .grid-fade {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #0d0d0d 20%, transparent 100%);
            z-index: 0;
        }

        .container { max-width: 600px; padding: 2rem; z-index: 1; }
        h1 { font-size: 4rem; letter-spacing: 4px; margin-bottom: 1rem; font-weight: 300; text-transform: uppercase; }
        h1 span { color: #00ffcc; font-weight: 600; }
        p { font-size: 1.2rem; color: #888; margin-bottom: 2rem; line-height: 1.5; }

        .status-box {
            display: inline-block; border: 1px solid #333; padding: 0.75rem 1.5rem;
            border-radius: 4px; background: rgba(255, 255, 255, 0.05);
            font-family: monospace; font-size: 0.9rem; color: #00ffcc; letter-spacing: 1px;
            margin-bottom: 3rem;
        }

        .pulse {
            display: inline-block; width: 8px; height: 8px; background-color: #00ffcc;
            border-radius: 50%; margin-right: 8px; animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }

        /* Terminal Navigation Menu */
        .terminal-nav {
            display: flex;
            gap: 2rem;
            justify-content: center;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            flex-wrap: wrap; /* Allows wrapping on smaller mobile screens */
        }

        .terminal-nav a {
            color: #666;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .terminal-nav a:hover {
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="background-grid"></div>
        <div class="grid-fade"></div>
    </div>
    
    <div class="container">
        <h1>Florio<span>Labs</span></h1>
        <p>Hardware Engineering & Software Development. <br>Custom electronics, firmware, and cinematic control systems.</p>
        
        <div class="status-box">
            <span class="pulse"></span> DEPLOYMENT PENDING... [COMING SOON]
        </div>

        <div class="terminal-nav">
            <a href="products/C4X.html">[ C4-X DEVICE ]</a>
            <a href="devlog/index.html">[ ENGINEERING LOGS ]</a>
            <a href="bug-report.html">[ SYSTEM DIAGNOSTICS ]</a>
        </div>
    </div>
</body>
</html>
